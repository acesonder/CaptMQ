<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OUTSINC VR Experience">
    <title>OUTSINC VR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gothic', 'Old English Text MT', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #87CEEB 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOut 6s ease-in-out forwards;
            animation-delay: 3s;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.3);
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
        }

        .cloud1 {
            width: 200px;
            height: 60px;
            top: 20%;
            left: -200px;
            animation: float1 30s linear infinite;
        }

        .cloud1::before {
            width: 100px;
            height: 80px;
            top: -40px;
            left: 20px;
        }

        .cloud1::after {
            width: 120px;
            height: 70px;
            top: -30px;
            right: 20px;
        }

        .cloud2 {
            width: 250px;
            height: 70px;
            top: 60%;
            left: -250px;
            animation: float2 35s linear infinite;
            animation-delay: 5s;
        }

        .cloud2::before {
            width: 120px;
            height: 90px;
            top: -45px;
            left: 30px;
        }

        .cloud2::after {
            width: 140px;
            height: 80px;
            top: -35px;
            right: 30px;
        }

        .cloud3 {
            width: 180px;
            height: 55px;
            top: 40%;
            left: -180px;
            animation: float3 40s linear infinite;
            animation-delay: 10s;
        }

        .cloud3::before {
            width: 90px;
            height: 70px;
            top: -35px;
            left: 15px;
        }

        .cloud3::after {
            width: 110px;
            height: 65px;
            top: -28px;
            right: 15px;
        }

        @keyframes float1 {
            0% { left: -200px; }
            100% { left: 110%; }
        }

        @keyframes float2 {
            0% { left: -250px; }
            100% { left: 110%; }
        }

        @keyframes float3 {
            0% { left: -180px; }
            100% { left: 110%; }
        }

        /* Logo */
        #logo {
            font-size: 120px;
            font-weight: bold;
            color: #000;
            text-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(0, 0, 0, 0.2),
                5px 5px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 8px;
            position: relative;
            z-index: 10;
            animation: fadeIn 2s ease-in-out;
            font-family: 'Impact', 'Gothic', 'Haettenschweiler', 'Arial Black', sans-serif;
            text-transform: uppercase;
            transform: perspective(500px) rotateX(10deg);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: perspective(500px) rotateX(10deg) scale(0.8); }
            100% { opacity: 1; transform: perspective(500px) rotateX(10deg) scale(1); }
        }

        /* Main Menu */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeInMenu 2s ease-in-out;
        }

        #main-menu.active {
            display: flex;
        }

        @keyframes fadeInMenu {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .star1 { width: 2px; height: 2px; top: 10%; left: 15%; animation-delay: 0s; }
        .star2 { width: 3px; height: 3px; top: 20%; left: 80%; animation-delay: 0.5s; }
        .star3 { width: 2px; height: 2px; top: 30%; left: 40%; animation-delay: 1s; }
        .star4 { width: 3px; height: 3px; top: 50%; left: 70%; animation-delay: 1.5s; }
        .star5 { width: 2px; height: 2px; top: 60%; left: 25%; animation-delay: 2s; }
        .star6 { width: 3px; height: 3px; top: 75%; left: 60%; animation-delay: 2.5s; }
        .star7 { width: 2px; height: 2px; top: 85%; left: 90%; animation-delay: 0.7s; }
        .star8 { width: 3px; height: 3px; top: 15%; left: 50%; animation-delay: 1.2s; }
        .star9 { width: 2px; height: 2px; top: 45%; left: 10%; animation-delay: 1.8s; }
        .star10 { width: 3px; height: 3px; top: 70%; left: 85%; animation-delay: 2.3s; }

        /* Moving stars animation */
        @keyframes moveStars {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-5px) translateY(5px); }
        }

        .star {
            animation: twinkle 3s ease-in-out infinite, moveStars 10s linear infinite;
        }

        /* Menu Container */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .menu-item {
            font-size: 60px;
            color: white;
            text-align: center;
            cursor: pointer;
            font-family: 'Impact', 'Gothic', 'Haettenschweiler', 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.8),
                0 0 10px rgba(255, 255, 255, 0.3);
            user-select: none;
        }

        .menu-item:hover {
            transform: scale(1.1);
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4);
        }

        .menu-item:active {
            transform: scale(1.05);
        }

        /* VR-specific styles */
        @media (hover: none) and (pointer: coarse) {
            .menu-item {
                font-size: 50px;
            }
            
            #logo {
                font-size: 80px;
            }
        }

        /* Support for WebXR */
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <h1 id="logo">OUTSINC</h1>
    </div>

    <!-- Main Menu -->
    <div id="main-menu">
        <!-- Stars -->
        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>
        <div class="star star8"></div>
        <div class="star star9"></div>
        <div class="star star10"></div>

        <!-- Menu Items -->
        <div class="menu-container">
            <div class="menu-item" onclick="startNewGame()">New Game</div>
            <div class="menu-item" onclick="openSettings()">Settings</div>
            <div class="menu-item" onclick="openOptions()">Options</div>
            <div class="menu-item" onclick="quitGame()">Quit</div>
        </div>
    </div>

    <script>
        // Show main menu after splash screen
        setTimeout(() => {
            document.getElementById('main-menu').classList.add('active');
        }, 9000); // 3s display + 6s fade out

        // Menu functions
        function startNewGame() {
            console.log('Starting new game...');
            alert('New Game - Game functionality would be implemented here');
        }

        function openSettings() {
            console.log('Opening settings...');
            alert('Settings - Settings menu would be implemented here');
        }

        function openOptions() {
            console.log('Opening options...');
            alert('Options - Options menu would be implemented here');
        }

        function quitGame() {
            console.log('Quitting game...');
            if (confirm('Are you sure you want to quit?')) {
                window.close();
            }
        }

        // WebXR support check
        if ('xr' in navigator) {
            navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
                if (supported) {
                    console.log('WebXR VR supported!');
                } else {
                    console.log('WebXR VR not supported on this device');
                }
            });
        } else {
            console.log('WebXR not available');
        }

        // Handle VR controller input
        window.addEventListener('gamepadconnected', (e) => {
            console.log('Gamepad connected:', e.gamepad);
        });

        // Prevent accidental back navigation on VR devices
        window.addEventListener('popstate', (e) => {
            e.preventDefault();
        });

        // Add touch support for VR controllers
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('touchstart', function() {
                this.style.transform = 'scale(1.05)';
            });
            item.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
