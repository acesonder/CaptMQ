<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OUTSINC VR Experience">
    <title>OUTSINC VR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel', 'Crimson Text', 'Old English Text MT', 'Times New Roman', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #87CEEB 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOut 6s ease-in-out forwards;
            animation-delay: 3s;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* Clouds */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.3);
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
        }

        .cloud1 {
            width: 200px;
            height: 60px;
            top: 20%;
            left: -200px;
            animation: float1 30s linear infinite;
        }

        .cloud1::before {
            width: 100px;
            height: 80px;
            top: -40px;
            left: 20px;
        }

        .cloud1::after {
            width: 120px;
            height: 70px;
            top: -30px;
            right: 20px;
        }

        .cloud2 {
            width: 250px;
            height: 70px;
            top: 60%;
            left: -250px;
            animation: float2 35s linear infinite;
            animation-delay: 5s;
        }

        .cloud2::before {
            width: 120px;
            height: 90px;
            top: -45px;
            left: 30px;
        }

        .cloud2::after {
            width: 140px;
            height: 80px;
            top: -35px;
            right: 30px;
        }

        .cloud3 {
            width: 180px;
            height: 55px;
            top: 40%;
            left: -180px;
            animation: float3 40s linear infinite;
            animation-delay: 10s;
        }

        .cloud3::before {
            width: 90px;
            height: 70px;
            top: -35px;
            left: 15px;
        }

        .cloud3::after {
            width: 110px;
            height: 65px;
            top: -28px;
            right: 15px;
        }

        @keyframes float1 {
            0% { left: -200px; }
            100% { left: 110%; }
        }

        @keyframes float2 {
            0% { left: -250px; }
            100% { left: 110%; }
        }

        @keyframes float3 {
            0% { left: -180px; }
            100% { left: 110%; }
        }

        /* Logo */
        #logo {
            font-size: 120px;
            font-weight: bold;
            color: #000;
            text-shadow: 
                0 0 20px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(0, 0, 0, 0.2),
                5px 5px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 8px;
            position: relative;
            z-index: 10;
            animation: fadeIn 2s ease-in-out;
            font-family: 'Impact', 'Gothic', 'Haettenschweiler', 'Arial Black', sans-serif;
            text-transform: uppercase;
            transform: perspective(500px) rotateX(10deg);
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: perspective(500px) rotateX(10deg) scale(0.8); }
            100% { opacity: 1; transform: perspective(500px) rotateX(10deg) scale(1); }
        }

        /* Main Menu */
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeInMenu 2s ease-in-out;
        }

        #main-menu.active {
            display: flex;
        }

        @keyframes fadeInMenu {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            animation: twinkle 3s ease-in-out infinite, moveStars 10s linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        @keyframes moveStars {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-5px) translateY(5px); }
        }

        .star1 { width: 2px; height: 2px; top: 10%; left: 15%; animation-delay: 0s; }
        .star2 { width: 3px; height: 3px; top: 20%; left: 80%; animation-delay: 0.5s; }
        .star3 { width: 2px; height: 2px; top: 30%; left: 40%; animation-delay: 1s; }
        .star4 { width: 3px; height: 3px; top: 50%; left: 70%; animation-delay: 1.5s; }
        .star5 { width: 2px; height: 2px; top: 60%; left: 25%; animation-delay: 2s; }
        .star6 { width: 3px; height: 3px; top: 75%; left: 60%; animation-delay: 2.5s; }
        .star7 { width: 2px; height: 2px; top: 85%; left: 90%; animation-delay: 0.7s; }
        .star8 { width: 3px; height: 3px; top: 15%; left: 50%; animation-delay: 1.2s; }
        .star9 { width: 2px; height: 2px; top: 45%; left: 10%; animation-delay: 1.8s; }
        .star10 { width: 3px; height: 3px; top: 70%; left: 85%; animation-delay: 2.3s; }

        /* Menu Container */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .menu-item {
            font-size: 60px;
            color: white;
            text-align: center;
            cursor: pointer;
            font-family: 'Impact', 'Gothic', 'Haettenschweiler', 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.8),
                0 0 10px rgba(255, 255, 255, 0.3);
            user-select: none;
        }

        .menu-item:hover {
            transform: scale(1.1);
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4);
        }

        .menu-item:active {
            transform: scale(1.05);
        }

        /* Game Selection Menu */
        #game-selection {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeInMenu 2s ease-in-out;
        }

        #game-selection.active {
            display: flex;
        }

        /* Settings Menu */
        #settings-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeInMenu 2s ease-in-out;
            overflow-y: auto;
            padding: 20px;
        }

        #settings-menu.active {
            display: flex;
        }

        .settings-container {
            max-width: 800px;
            width: 90%;
            color: white;
            z-index: 10;
        }

        .settings-section {
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
        }

        .settings-section h2 {
            font-size: 36px;
            margin-bottom: 20px;
            font-family: 'Impact', 'Gothic', 'Haettenschweiler', 'Arial Black', sans-serif;
            text-transform: uppercase;
        }

        .setting-item {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-item label {
            font-size: 20px;
            flex: 1;
        }

        .setting-item select,
        .setting-item input[type="range"] {
            flex: 1;
            max-width: 300px;
            font-size: 18px;
            padding: 5px;
        }

        .setting-value {
            min-width: 50px;
            text-align: center;
            font-size: 20px;
            margin-left: 10px;
        }

        /* Game Canvas */
        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        #game-canvas.active {
            display: block;
        }

        /* VR-specific styles */
        @media (hover: none) and (pointer: coarse) {
            .menu-item {
                font-size: 50px;
            }
            
            #logo {
                font-size: 80px;
            }
        }

        /* Support for WebXR */
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <h1 id="logo">OUTSINC</h1>
    </div>

    <!-- Main Menu -->
    <div id="main-menu">
        <!-- Stars -->
        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>
        <div class="star star8"></div>
        <div class="star star9"></div>
        <div class="star star10"></div>

        <!-- Menu Items -->
        <div class="menu-container">
            <div class="menu-item" onclick="startNewGame()">New Game</div>
            <div class="menu-item" onclick="openSettings()">Settings</div>
            <div class="menu-item" onclick="openOptions()">Options</div>
            <div class="menu-item" onclick="quitGame()">Quit</div>
        </div>
    </div>

    <!-- Game Selection Menu -->
    <div id="game-selection">
        <!-- Stars -->
        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>
        <div class="star star8"></div>
        <div class="star star9"></div>
        <div class="star star10"></div>

        <!-- Game Selection Items -->
        <div class="menu-container">
            <div class="menu-item" onclick="startPassThroughMode()">Pass Through Mode</div>
            <div class="menu-item" onclick="startSnowboarding()">Snowboarding</div>
            <div class="menu-item" onclick="startVRRoom()">Virtual Reality Room</div>
            <div class="menu-item" onclick="backToMainMenu()">Back to Main Menu</div>
        </div>
    </div>

    <!-- Settings Menu -->
    <div id="settings-menu">
        <!-- Stars -->
        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>
        <div class="star star8"></div>
        <div class="star star9"></div>
        <div class="star star10"></div>

        <!-- Settings Content -->
        <div class="settings-container">
            <h1 style="text-align: center; font-size: 60px; margin-bottom: 40px; font-family: 'Impact', 'Gothic', 'Haettenschweiler', 'Arial Black', sans-serif;">SETTINGS</h1>
            
            <!-- Pass Through Mode Settings -->
            <div class="settings-section">
                <h2>Pass Through Mode</h2>
                <div class="setting-item">
                    <label for="ball-spawn-rate">Ball Spawn Rate:</label>
                    <input type="range" id="ball-spawn-rate" min="1" max="10" value="5" oninput="updateSettingValue('ball-spawn-rate-value', this.value)">
                    <span class="setting-value" id="ball-spawn-rate-value">5</span>
                </div>
                <div class="setting-item">
                    <label for="physics-strength">Physics Strength:</label>
                    <input type="range" id="physics-strength" min="1" max="10" value="7" oninput="updateSettingValue('physics-strength-value', this.value)">
                    <span class="setting-value" id="physics-strength-value">7</span>
                </div>
                <div class="setting-item">
                    <label for="ball-types">Ball Types:</label>
                    <select id="ball-types">
                        <option value="both">Both</option>
                        <option value="tennis">Tennis Only</option>
                        <option value="basketball">Basketball Only</option>
                    </select>
                </div>
            </div>

            <!-- Snowboarding Settings -->
            <div class="settings-section">
                <h2>Snowboarding</h2>
                <div class="setting-item">
                    <label for="difficulty">Difficulty:</label>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="control-sensitivity">Control Sensitivity:</label>
                    <input type="range" id="control-sensitivity" min="1" max="10" value="5" oninput="updateSettingValue('control-sensitivity-value', this.value)">
                    <span class="setting-value" id="control-sensitivity-value">5</span>
                </div>
                <div class="setting-item">
                    <label for="trick-assist">Trick Assist:</label>
                    <select id="trick-assist">
                        <option value="on">On</option>
                        <option value="off">Off</option>
                    </select>
                </div>
            </div>

            <!-- VR Room Settings -->
            <div class="settings-section">
                <h2>Virtual Reality Room</h2>
                <div class="setting-item">
                    <label for="room-brightness">Room Brightness:</label>
                    <input type="range" id="room-brightness" min="1" max="10" value="3" oninput="updateSettingValue('room-brightness-value', this.value)">
                    <span class="setting-value" id="room-brightness-value">3</span>
                </div>
                <div class="setting-item">
                    <label for="interaction-mode">Interaction Mode:</label>
                    <select id="interaction-mode">
                        <option value="pointer">Pointer</option>
                        <option value="grab" selected>Grab</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="texture-quality">Texture Quality:</label>
                    <select id="texture-quality">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high" selected>High</option>
                    </select>
                </div>
            </div>

            <div style="text-align: center; margin-top: 40px;">
                <div class="menu-item" onclick="saveSettings()">Save Settings</div>
                <div class="menu-item" onclick="backToMainMenu()">Back to Main Menu</div>
            </div>
        </div>
    </div>

    <!-- Game Canvas -->
    <canvas id="game-canvas"></canvas>

    <script>
        // Show main menu after splash screen
        setTimeout(() => {
            document.getElementById('main-menu').classList.add('active');
        }, 9000); // 3s display + 6s fade out

        // Settings state
        let settings = {
            passThroughMode: {
                ballSpawnRate: 5,
                physicsStrength: 7,
                ballTypes: 'both'
            },
            snowboarding: {
                difficulty: 'medium',
                controlSensitivity: 5,
                trickAssist: 'on'
            },
            vrRoom: {
                roomBrightness: 3,
                interactionMode: 'grab',
                textureQuality: 'high'
            }
        };

        // Load settings from localStorage
        function loadSettings() {
            try {
                const saved = localStorage.getItem('outsinc-vr-settings');
                if (saved) {
                    settings = JSON.parse(saved);
                    applySettingsToUI();
                }
            } catch (error) {
                console.error('Failed to load settings:', error);
                // Keep default settings if loading fails
            }
        }

        // Apply settings to UI
        function applySettingsToUI() {
            document.getElementById('ball-spawn-rate').value = settings.passThroughMode.ballSpawnRate;
            document.getElementById('ball-spawn-rate-value').textContent = settings.passThroughMode.ballSpawnRate;
            document.getElementById('physics-strength').value = settings.passThroughMode.physicsStrength;
            document.getElementById('physics-strength-value').textContent = settings.passThroughMode.physicsStrength;
            document.getElementById('ball-types').value = settings.passThroughMode.ballTypes;
            
            document.getElementById('difficulty').value = settings.snowboarding.difficulty;
            document.getElementById('control-sensitivity').value = settings.snowboarding.controlSensitivity;
            document.getElementById('control-sensitivity-value').textContent = settings.snowboarding.controlSensitivity;
            document.getElementById('trick-assist').value = settings.snowboarding.trickAssist;
            
            document.getElementById('room-brightness').value = settings.vrRoom.roomBrightness;
            document.getElementById('room-brightness-value').textContent = settings.vrRoom.roomBrightness;
            document.getElementById('interaction-mode').value = settings.vrRoom.interactionMode;
            document.getElementById('texture-quality').value = settings.vrRoom.textureQuality;
        }

        // Update setting value display
        function updateSettingValue(elementId, value) {
            document.getElementById(elementId).textContent = value;
        }

        // Save settings
        function saveSettings() {
            settings.passThroughMode.ballSpawnRate = parseInt(document.getElementById('ball-spawn-rate').value);
            settings.passThroughMode.physicsStrength = parseInt(document.getElementById('physics-strength').value);
            settings.passThroughMode.ballTypes = document.getElementById('ball-types').value;
            
            settings.snowboarding.difficulty = document.getElementById('difficulty').value;
            settings.snowboarding.controlSensitivity = parseInt(document.getElementById('control-sensitivity').value);
            settings.snowboarding.trickAssist = document.getElementById('trick-assist').value;
            
            settings.vrRoom.roomBrightness = parseInt(document.getElementById('room-brightness').value);
            settings.vrRoom.interactionMode = document.getElementById('interaction-mode').value;
            settings.vrRoom.textureQuality = document.getElementById('texture-quality').value;
            
            localStorage.setItem('outsinc-vr-settings', JSON.stringify(settings));
            alert('Settings saved successfully!');
        }

        // Menu navigation functions
        function hideAllScreens() {
            document.getElementById('main-menu').classList.remove('active');
            document.getElementById('game-selection').classList.remove('active');
            document.getElementById('settings-menu').classList.remove('active');
            document.getElementById('game-canvas').classList.remove('active');
        }

        function startNewGame() {
            console.log('Starting new game...');
            hideAllScreens();
            document.getElementById('game-selection').classList.add('active');
        }

        function openSettings() {
            console.log('Opening settings...');
            hideAllScreens();
            document.getElementById('settings-menu').classList.add('active');
        }

        function openOptions() {
            console.log('Opening options...');
            alert('Options - Additional options would be implemented here');
        }

        function quitGame() {
            console.log('Quitting game...');
            if (confirm('Are you sure you want to quit?')) {
                // In VR browsers, window.close() may not work, so redirect to a safe page
                window.location.href = 'about:blank';
            }
        }

        function backToMainMenu() {
            hideAllScreens();
            document.getElementById('main-menu').classList.add('active');
        }

        // Game state
        let currentGame = null;
        let xrSession = null;
        let gl = null;
        let xrRefSpace = null;
        let animationFrameId = null;
        let render2DId = null;

        // Start Pass Through Mode
        async function startPassThroughMode() {
            console.log('Starting Pass Through Mode...');
            currentGame = 'passthrough';
            await initializeWebXR('passthrough');
        }

        // Start Snowboarding
        async function startSnowboarding() {
            console.log('Starting Snowboarding...');
            currentGame = 'snowboarding';
            await initializeWebXR('snowboarding');
        }

        // Start VR Room
        async function startVRRoom() {
            console.log('Starting Virtual Reality Room...');
            currentGame = 'vrroom';
            await initializeWebXR('vrroom');
        }

        // Initialize WebXR session
        async function initializeWebXR(gameType) {
            if (!navigator.xr) {
                alert('WebXR not supported. Please use a VR-capable browser.');
                return;
            }

            try {
                hideAllScreens();
                const canvas = document.getElementById('game-canvas');
                canvas.classList.add('active');
                gl = canvas.getContext('webgl', { xrCompatible: true });

                if (!gl) {
                    alert('WebGL not supported');
                    return;
                }

                // Request XR session based on game type
                const sessionInit = {
                    requiredFeatures: ['local-floor']
                };

                if (gameType === 'passthrough') {
                    // Pass through mode requires AR features if available
                    sessionInit.optionalFeatures = ['dom-overlay'];
                }

                xrSession = await navigator.xr.requestSession('immersive-vr', sessionInit);
                
                await gl.makeXRCompatible();
                
                xrSession.updateRenderState({
                    baseLayer: new XRWebGLLayer(xrSession, gl)
                });

                xrRefSpace = await xrSession.requestReferenceSpace('local-floor');

                // Start the render loop
                xrSession.requestAnimationFrame(onXRFrame);

                // Handle session end
                xrSession.addEventListener('end', onSessionEnded);

                console.log(`${gameType} session started`);
            } catch (error) {
                console.error('Error starting XR session:', error);
                alert(`Failed to start VR session: ${error.message}\n\nFalling back to 2D preview mode.`);
                // Fallback to 2D rendering
                start2DGame(gameType);
            }
        }

        // XR Frame callback
        function onXRFrame(time, frame) {
            const session = frame.session;
            animationFrameId = session.requestAnimationFrame(onXRFrame);

            const pose = frame.getViewerPose(xrRefSpace);
            
            if (pose) {
                const glLayer = session.renderState.baseLayer;
                gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
                
                // Render based on current game
                if (currentGame === 'passthrough') {
                    renderPassThroughMode(time, frame, pose);
                } else if (currentGame === 'snowboarding') {
                    renderSnowboarding(time, frame, pose);
                } else if (currentGame === 'vrroom') {
                    renderVRRoom(time, frame, pose);
                }
            }
        }

        // Game rendering functions
        function renderPassThroughMode(time, frame, pose) {
            // Clear the canvas
            gl.clearColor(0, 0, 0, 0);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.enable(gl.DEPTH_TEST);

            for (const view of pose.views) {
                const viewport = frame.session.renderState.baseLayer.getViewport(view);
                gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);

                // Render balls and physics simulation
                // (Simplified - in production this would use a full 3D engine like Three.js)
                renderBalls(view);
            }
        }

        function renderSnowboarding(time, frame, pose) {
            // Clear with sky blue
            gl.clearColor(0.53, 0.81, 0.92, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.enable(gl.DEPTH_TEST);

            for (const view of pose.views) {
                const viewport = frame.session.renderState.baseLayer.getViewport(view);
                gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);

                // Render snowboarding scene
                renderSnowScene(view, time);
            }
        }

        function renderVRRoom(time, frame, pose) {
            // Clear with dark color
            const brightness = settings.vrRoom.roomBrightness / 10;
            gl.clearColor(0.05 * brightness, 0.05 * brightness, 0.05 * brightness, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            gl.enable(gl.DEPTH_TEST);

            for (const view of pose.views) {
                const viewport = frame.session.renderState.baseLayer.getViewport(view);
                gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);

                // Render dark room scene
                renderDarkRoom(view);

        // 2D Fallback for testing without VR headset
        function start2DGame(gameType) {
            // Stop any existing render loop
            if (render2DId) {
                cancelAnimationFrame(render2DId);
                render2DId = null;
            }
            
            const canvas = document.getElementById('game-canvas');
            canvas.classList.add('active');
            
            // Get the canvas parent and replace it to clear WebGL context
            const parent = canvas.parentNode;
            const newCanvas = canvas.cloneNode(true);
            newCanvas.id = 'game-canvas';
            parent.replaceChild(newCanvas, canvas);
            
            // Now work with the new canvas
            const ctx = newCanvas.getContext('2d');
            newCanvas.width = window.innerWidth;
            newCanvas.height = window.innerHeight;

            function render2D() {
                if (!ctx) return;
                ctx.clearRect(0, 0, newCanvas.width, newCanvas.height);

                if (gameType === 'passthrough') {
                    render2DPassThrough(ctx);
                } else if (gameType === 'snowboarding') {
                    render2DSnowboarding(ctx);
                } else if (gameType === 'vrroom') {
                    render2DVRRoom(ctx);
                }

                render2DId = requestAnimationFrame(render2D);
            }

            render2D();
        }

        function render2DPassThrough(ctx) {
            // Draw simple preview
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.fillStyle = 'black';
            ctx.font = '48px Impact';
            ctx.textAlign = 'center';
            ctx.fillText('PASS THROUGH MODE', ctx.canvas.width / 2, ctx.canvas.height / 2 - 100);
            ctx.font = '24px Arial';
            ctx.fillText('Mixed Reality: Throw balls that bounce off real-world objects', ctx.canvas.width / 2, ctx.canvas.height / 2);
            ctx.fillText('Press ESC to return to menu', ctx.canvas.width / 2, ctx.canvas.height / 2 + 50);
        }

        function render2DSnowboarding(ctx) {
            // Draw simple preview
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(0, ctx.canvas.height * 0.6, ctx.canvas.width, ctx.canvas.height * 0.4);
            ctx.fillStyle = 'black';
            ctx.font = '48px Impact';
            ctx.textAlign = 'center';
            ctx.fillText('SNOWBOARDING', ctx.canvas.width / 2, ctx.canvas.height / 2 - 100);
            ctx.font = '24px Arial';
            ctx.fillText('Ride down a snowy mountain performing tricks!', ctx.canvas.width / 2, ctx.canvas.height / 2);
            ctx.fillText('Press ESC to return to menu', ctx.canvas.width / 2, ctx.canvas.height / 2 + 50);
        }

        function render2DVRRoom(ctx) {
            const brightness = settings.vrRoom.roomBrightness / 10;
            ctx.fillStyle = `rgb(${13 * brightness}, ${13 * brightness}, ${13 * brightness})`;
            ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '48px Impact';
            ctx.textAlign = 'center';
            ctx.fillText('VIRTUAL REALITY ROOM', ctx.canvas.width / 2, ctx.canvas.height / 2 - 100);
            ctx.font = '24px Arial';
            ctx.fillText('Dark room with realistic furniture and 4 doors', ctx.canvas.width / 2, ctx.canvas.height / 2);
            ctx.fillText('Press ESC to return to menu', ctx.canvas.width / 2, ctx.canvas.height / 2 + 50);
        }

        // Session end handler
        function onSessionEnded() {
            xrSession = null;
            xrRefSpace = null;
            backToMainMenu();
        }

        // Handle ESC key to exit games
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && currentGame) {
                if (xrSession) {
                    xrSession.end();
                } else if (render2DId) {
                    cancelAnimationFrame(render2DId);
                    render2DId = null;
                    backToMainMenu();
                }
                currentGame = null;
            }
        });

        // WebXR support check
        if ('xr' in navigator) {
            navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
                if (supported) {
                    console.log('WebXR VR supported!');
                } else {
                    console.log('WebXR VR not supported on this device');
                }
            });
        } else {
            console.log('WebXR not available');
        }

        // Handle VR controller input
        window.addEventListener('gamepadconnected', (e) => {
            console.log('Gamepad connected:', e.gamepad);
        });

        // Add touch support for VR controllers
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('touchstart', function() {
                this.style.transform = 'scale(1.05)';
            });
            item.addEventListener('touchend', function() {
                this.style.transform = 'scale(1)';
            });
        });

        // Load settings on page load
        loadSettings();
